spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/MaridOne
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    contexts: dev

jwt:
  secret: DBJLzOFR+2X80I/8vtaH22D/0Tldy0qU1KlxXLYDiwA=

default:
  url: http://localhost:5173

holiday:
  enabled: true
  api-key: ${CALENDARIFIC_API_KEY:}
  country: PH
  base-url: https://calendarific.com/api/v2/holidays
  cache-dir: .cache/holidays
  override-file: .cache/holidays/holiday-overrides.json
  refresh-after: 365d
  connect-timeout: 5s
  request-timeout: 10s
