cloud:
  access-key: ${CLOUD_ACCESS_KEY}
  bucket-name: ${CLOUD_BUCKET_NAME}
  secret-key: ${CLOUD_SECRET_KEY}
  endpoint: ${CLOUD_ENDPOINT}

holiday:
  enabled: true
  api-key: ${CALENDARIFIC_API_KEY:}
  country: PH
  base-url: https://calendarific.com/api/v2/holidays
  cache-dir: .cache/holidays
  override-file: .cache/holidays/holiday-overrides.json
  refresh-after: 365d
  connect-timeout: 5s
  request-timeout: 10s
